# Deploys are deliberately infrequent: the daily loop dispatches this after
# freeze/resolve, plus manual dispatch when needed. No on-push trigger —
# the Pages backend is intermittently flaky (actions/deploy-pages#406) and
# every deploy is exposure; preview locally with scripts/build_site.py.
name: site
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run python scripts/build_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true
      # Pages throws transient "try again later" errors; one in-run retry
      # (same artifact) avoids a red run. Never rerun failed Pages jobs from
      # the UI — that re-uploads a duplicate artifact and always fails.
      - name: wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - uses: actions/deploy-pages@v4
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
