# The daily loop: freeze at T-3, resolve on print day, commit artifacts,
# cut freeze releases (server-timestamped proof), then rebuild the site.
# Runs at 14:10 UTC = 9:10/10:10 AM ET, after the 8:30 AM ET prints.
name: loop
on:
  schedule:
    - cron: "10 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen

      - name: decide and act
        id: loop
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: uv run python scripts/loop.py

      - name: commit loop artifacts
        run: |
          git config user.name "waterline-loop"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || { git commit -m "loop: $(date -u +%F)"; git push; }

      - name: cut freeze releases
        if: steps.loop.outputs.frozen != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for mp in $(echo "${{ steps.loop.outputs.frozen }}" | tr ',' ' '); do
            m="${mp%%:*}"; p="${mp#*:}"
            notes=$(uv run python -c "
          import json, sys
          from waterline.loop import METRICS
          m, p = '$m', '$p'
          f = json.load(open(f'forecasts/{m}/{p}.json'))
          pc = f['percentiles']
          unit = METRICS[m]['unit']
          print(f\"{METRICS[m]['title']} {f['period']} frozen at p10 {pc['p10']:,.3f} / p50 {pc['p50']:,.3f} / p90 {pc['p90']:,.3f} {unit}.\")
          print(f\"Scheduled release: {f['release_date']}. Commit {f.get('git_commit','?')[:8]}.\")
          print(f'This release timestamp is the public proof the forecast predates the print. Full assumptions: forecasts/{m}/{p}.json')
          ")
            gh release create "freeze/$m-$p" \
              --title "Freeze: $m $p" \
              --notes "$notes" \
              --target "$(git rev-parse HEAD)"
          done

      - name: re-author assumptions after resolve
        if: contains(steps.loop.outputs.resolved, 'cpi:')
        id: reauthor
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          uv run python scripts/author_cpi.py
          uv run python scripts/backtest_cpi.py > /dev/null
          uv run python scripts/pr_delta.py --base-ref HEAD --out delta.md

      - name: open re-authoring PR
        if: contains(steps.loop.outputs.resolved, 'cpi:') && steps.reauthor.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="bot/reauthor-$(date -u +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add registry models docs data
          git commit -m "Re-author CPI assumptions after ${{ steps.loop.outputs.resolved }} print"
          git push -u origin "$BRANCH"
          {
            echo "Trailing windows and fit weights refreshed with the just-resolved"
            echo "${{ steps.loop.outputs.resolved }} print. Opened automatically by the loop;"
            echo "merge to adopt, close to keep the previous assumptions."
            echo ""
            cat delta.md
          } > body.md
          gh pr create --base main --head "$BRANCH" \
            --title "Re-author CPI assumptions after ${{ steps.loop.outputs.resolved }} print" \
            --body-file body.md
          git checkout main

      - name: discard unchanged re-authoring
        if: contains(steps.loop.outputs.resolved, 'cpi:') && steps.reauthor.outputs.changed != 'true'
        run: git checkout -- .

      - name: rebuild site
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run site.yml --ref main
